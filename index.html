<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NHB Campaign Progress</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d9dee7;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --error: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .app-shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .hero,
      .result-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
        gap: 24px;
        align-items: end;
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 34px;
        line-height: 1.12;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 20px;
      }

      .intro {
        max-width: 560px;
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .lookup-form {
        display: grid;
        gap: 8px;
      }

      .lookup-form label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .lookup-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 13px;
        color: var(--text);
      }

      button {
        border: 0;
        padding: 0 18px;
        background: var(--brand);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .result-panel {
        margin-top: 18px;
        overflow: hidden;
      }

      .state {
        padding: 22px;
      }

      .empty,
      .loading {
        color: var(--muted);
      }

      .error {
        color: var(--error);
      }

      .state p {
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .rider-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .rider-summary div,
      .progress-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9fafb;
      }

      .rider-summary div {
        padding: 14px;
      }

      .rider-summary span,
      .progress-card span,
      .progress-card small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .rider-summary strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
      }

      .progress-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .progress-card {
        padding: 16px;
      }

      .progress-card strong {
        display: block;
        margin-top: 8px;
        font-size: 40px;
        line-height: 1;
      }

      .progress-card small {
        margin-top: 5px;
      }

      .status {
        display: inline-flex;
        margin-top: 16px;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .status.complete {
        background: #dcfce7;
        color: #166534;
      }

      .status.active {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status.unknown {
        background: #f2f4f7;
        color: #475467;
      }

      .refresh-note {
        margin-top: 16px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 24px, 980px);
          padding: 20px 0;
        }

        .hero,
        .lookup-row,
        .rider-summary,
        .progress-grid {
          display: block;
        }

        .hero {
          padding: 22px;
        }

        h1 {
          font-size: 28px;
        }

        .lookup-form,
        .rider-summary div,
        .progress-card {
          margin-top: 12px;
        }

        button {
          width: 100%;
          margin-top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">NHB Campaign</p>
          <h1>Check your campaign progress</h1>
          <p class="intro">
            Enter your rider ID to see completed orders counted from your hiring date.
          </p>
        </div>

        <form class="lookup-form" id="lookupForm">
          <label for="riderIdInput">Rider ID</label>
          <div class="lookup-row">
            <input
              id="riderIdInput"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="Enter rider ID"
              required
            >
            <button id="lookupButton" type="submit">Check progress</button>
          </div>
        </form>
      </section>

      <section class="result-panel" aria-live="polite">
        <div id="result" class="state empty">
          Enter your rider ID above to view your latest progress.
        </div>
      </section>
    </main>

    <script>
      const CONFIG = {
        // This works when the spreadsheet is public. If Google gives you a different
        // published CSV URL, replace this value with that exact URL.
        csvUrl: 'https://docs.google.com/spreadsheets/d/1xgqEmYw6HO1MYUY_g-JHjyWZxWlpEHRHjf_OGpKfruY/gviz/tq?tqx=out:csv&sheet=Sheet1'
      };

      const form = document.getElementById('lookupForm');
      const input = document.getElementById('riderIdInput');
      const button = document.getElementById('lookupButton');
      const result = document.getElementById('result');

      let cachedRows = null;

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const riderId = input.value.trim();
        if (!riderId) return;

        setLoading(true);

        try {
          const rows = await loadRows();
          const row = findRider(rows, riderId);

          if (!row) {
            renderProgress({
              found: false,
              riderId
            });
            return;
          }

          renderProgress(buildProgress(row, riderId));
        } catch (error) {
          result.className = 'state error';
          result.textContent = error.message || 'Could not load progress. Please try again later.';
        } finally {
          setLoading(false);
        }
      });

      async function loadRows() {
        if (cachedRows) return cachedRows;

        const response = await fetch(`${CONFIG.csvUrl}&cacheBust=${Date.now()}`);
        if (!response.ok) {
          throw new Error('Could not load campaign data. Please try again later.');
        }

        const csvText = await response.text();
        cachedRows = parseCsv(csvText);
        return cachedRows;
      }

      function findRider(rows, riderId) {
        const normalizedRiderId = normalizeRiderId(riderId);
        return rows.find((row) => normalizeRiderId(getValue(row, ['rider_id', 'rider id', 'riderid'])) === normalizedRiderId);
      }

      function buildProgress(row, riderId) {
        return {
          found: true,
          riderId: getValue(row, ['rider_id', 'rider id', 'riderid']) || riderId,
          landedDate: getValue(row, ['landed_date', 'hire_date', 'hired_date', 'join_date']),
          daysSinceHired: getValue(row, ['days_since_hired', 'days since hired']),
          lastUpdated: new Intl.DateTimeFormat('en-SG', {
            dateStyle: 'medium',
            timeStyle: 'short',
            timeZone: 'Asia/Singapore'
          }).format(new Date()),
          windows: [
            {
              label: '7 days',
              completedOrders: getValue(row, ['completed_orders_within_7_days', 'orders_within_7_days', '7_days', '7 days']) || '0',
              windowCompleted: parseBoolean(getValue(row, ['completed_7_day_window', 'completed_7_days_window']))
            },
            {
              label: '15 days',
              completedOrders: getValue(row, ['completed_orders_within_15_days', 'orders_within_15_days', '15_days', '15 days']) || '0',
              windowCompleted: parseBoolean(getValue(row, ['completed_15_day_window', 'completed_15_days_window']))
            },
            {
              label: '30 days',
              completedOrders: getValue(row, ['completed_orders_within_30_days', 'orders_within_30_days', '30_days', '30 days']) || '0',
              windowCompleted: parseBoolean(getValue(row, ['completed_30_day_window', 'completed_30_days_window']))
            }
          ]
        };
      }

      function parseCsv(csvText) {
        const rows = [];
        let row = [];
        let cell = '';
        let insideQuotes = false;

        for (let index = 0; index < csvText.length; index += 1) {
          const char = csvText[index];
          const nextChar = csvText[index + 1];

          if (char === '"' && insideQuotes && nextChar === '"') {
            cell += '"';
            index += 1;
            continue;
          }

          if (char === '"') {
            insideQuotes = !insideQuotes;
            continue;
          }

          if (char === ',' && !insideQuotes) {
            row.push(cell);
            cell = '';
            continue;
          }

          if ((char === '\n' || char === '\r') && !insideQuotes) {
            if (char === '\r' && nextChar === '\n') index += 1;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
            continue;
          }

          cell += char;
        }

        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
        }

        const headers = (rows.shift() || []).map(normalizeHeader);
        return rows
          .filter((item) => item.some((value) => String(value || '').trim()))
          .map((item) => {
            const record = {};
            headers.forEach((header, index) => {
              record[header] = item[index] || '';
            });
            return record;
          });
      }

      function getValue(row, candidates) {
        for (const candidate of candidates) {
          const value = row[normalizeHeader(candidate)];
          if (value !== undefined && value !== '') return value;
        }
        return '';
      }

      function normalizeHeader(value) {
        return String(value || '').trim().toLowerCase().replace(/\s+/g, '_');
      }

      function normalizeRiderId(value) {
        return String(value || '').trim().toLowerCase();
      }

      function parseBoolean(value) {
        const normalized = String(value || '').trim().toLowerCase();
        if (!normalized) return null;
        if (['true', 'yes', 'y', '1', 'completed'].includes(normalized)) return true;
        if (['false', 'no', 'n', '0', 'in progress'].includes(normalized)) return false;
        return null;
      }

      function setLoading(isLoading) {
        button.disabled = isLoading;
        button.textContent = isLoading ? 'Checking...' : 'Check progress';

        if (isLoading) {
          result.className = 'state loading';
          result.textContent = 'Checking your progress...';
        }
      }

      function renderProgress(data) {
        if (!data.found) {
          result.className = 'state empty';
          result.innerHTML = `
            <h2>No record found</h2>
            <p>We could not find rider ID ${escapeHtml(data.riderId)} in the latest campaign data.</p>
          `;
          return;
        }

        result.className = 'state';
        result.innerHTML = `
          <div class="rider-summary">
            <div>
              <span>Rider ID</span>
              <strong>${escapeHtml(data.riderId)}</strong>
            </div>
            <div>
              <span>Hired date</span>
              <strong>${escapeHtml(data.landedDate || 'Not available')}</strong>
            </div>
            <div>
              <span>Days since hired</span>
              <strong>${escapeHtml(data.daysSinceHired || 'Not available')}</strong>
            </div>
          </div>

          <div class="progress-grid">
            ${data.windows.map(renderWindow).join('')}
          </div>

          <p class="refresh-note">Last checked: ${escapeHtml(data.lastUpdated || 'today')}</p>
        `;
      }

      function renderWindow(item) {
        const status = getWindowStatus(item.windowCompleted);
        return `
          <article class="progress-card">
            <span>${escapeHtml(item.label)}</span>
            <strong>${escapeHtml(item.completedOrders)}</strong>
            <small>completed orders</small>
            <div class="status ${status.className}">${status.label}</div>
          </article>
        `;
      }

      function getWindowStatus(windowCompleted) {
        if (windowCompleted === true) {
          return {
            className: 'complete',
            label: 'Window completed'
          };
        }

        if (windowCompleted === false) {
          return {
            className: 'active',
            label: 'Still in progress'
          };
        }

        return {
          className: 'unknown',
          label: 'Status unavailable'
        };
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NHB Campaign Progress</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d9dee7;
        --brand: #2563eb;
        --brand-dark: #1d4ed8;
        --error: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .app-shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .hero,
      .result-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 420px);
        gap: 24px;
        align-items: end;
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 34px;
        line-height: 1.12;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 20px;
      }

      .intro {
        max-width: 560px;
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .lookup-form {
        display: grid;
        gap: 8px;
      }

      .lookup-form label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .lookup-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      input,
      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        padding: 0 13px;
        color: var(--text);
      }

      button {
        border: 0;
        padding: 0 18px;
        background: var(--brand);
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--brand-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .result-panel {
        margin-top: 18px;
        overflow: hidden;
      }

      .state {
        padding: 22px;
      }

      .empty,
      .loading {
        color: var(--muted);
      }

      .error {
        color: var(--error);
      }

      .state p {
        margin-bottom: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .rider-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .rider-summary div,
      .progress-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f9fafb;
      }

      .rider-summary div {
        padding: 14px;
      }

      .rider-summary span,
      .progress-card span,
      .progress-card small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .rider-summary strong {
        display: block;
        margin-top: 6px;
        font-size: 18px;
      }

      .progress-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .progress-card {
        padding: 16px;
      }

      .progress-card strong {
        display: block;
        margin-top: 8px;
        font-size: 40px;
        line-height: 1;
      }

      .progress-card small {
        margin-top: 5px;
      }

      .status {
        display: inline-flex;
        margin-top: 16px;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .status.complete {
        background: #dcfce7;
        color: #166534;
      }

      .status.active {
        background: #dbeafe;
        color: #1d4ed8;
      }

      .status.unknown {
        background: #f2f4f7;
        color: #475467;
      }

      .refresh-note {
        margin-top: 16px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 24px, 980px);
          padding: 20px 0;
        }

        .hero,
        .lookup-row,
        .rider-summary,
        .progress-grid {
          display: block;
        }

        .hero {
          padding: 22px;
        }

        h1 {
          font-size: 28px;
        }

        .lookup-form,
        .rider-summary div,
        .progress-card {
          margin-top: 12px;
        }

        button {
          width: 100%;
          margin-top: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">NHB Campaign</p>
          <h1>Check your campaign progress</h1>
          <p class="intro">
            Enter your rider ID to see completed orders counted from your hiring date.
          </p>
        </div>

        <form class="lookup-form" id="lookupForm">
          <label for="riderIdInput">Rider ID</label>
          <div class="lookup-row">
            <input
              id="riderIdInput"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="Enter rider ID"
              required
            >
            <button id="lookupButton" type="submit">Check progress</button>
          </div>
        </form>
      </section>

      <section class="result-panel" aria-live="polite">
        <div id="result" class="state empty">
          Enter your rider ID above to view your latest progress.
        </div>
      </section>
    </main>

    <script>
      const CONFIG = {
        workerApiUrl: 'https://nji-progress-api.sally20001007.workers.dev/api/progress'
      };

      const form = document.getElementById('lookupForm');
      const input = document.getElementById('riderIdInput');
      const button = document.getElementById('lookupButton');
      const result = document.getElementById('result');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const riderId = input.value.trim();
        if (!riderId) return;

        setLoading(true);

        try {
          const params = new URLSearchParams({ riderId });
          const response = await fetch(`${CONFIG.workerApiUrl}?${params.toString()}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Could not load progress. Please try again later.');
          }

          renderProgress(data);
        } catch (error) {
          result.className = 'state error';
          result.textContent = error.message || 'Could not load progress. Please try again later.';
        } finally {
          setLoading(false);
        }
      });

      function setLoading(isLoading) {
        button.disabled = isLoading;
        button.textContent = isLoading ? 'Checking...' : 'Check progress';

        if (isLoading) {
          result.className = 'state loading';
          result.textContent = 'Checking your progress...';
        }
      }

      function renderProgress(data) {
        if (!data.found) {
          result.className = 'state empty';
          result.innerHTML = `
            <h2>No record found</h2>
            <p>We could not find rider ID ${escapeHtml(data.riderId)} in the latest campaign data.</p>
          `;
          return;
        }

        result.className = 'state';
        result.innerHTML = `
          <div class="rider-summary">
            <div>
              <span>Rider ID</span>
              <strong>${escapeHtml(data.riderId)}</strong>
            </div>
            <div>
              <span>Hired date</span>
              <strong>${escapeHtml(data.landedDate || 'Not available')}</strong>
            </div>
            <div>
              <span>Days since hired</span>
              <strong>${escapeHtml(data.daysSinceHired || 'Not available')}</strong>
            </div>
          </div>

          <div class="progress-grid">
            ${data.windows.map(renderWindow).join('')}
          </div>

          <p class="refresh-note">Last checked: ${escapeHtml(data.lastUpdated || 'today')}</p>
        `;
      }

      function renderWindow(item) {
        const status = getWindowStatus(item.windowCompleted);
        return `
          <article class="progress-card">
            <span>${escapeHtml(item.label)}</span>
            <strong>${escapeHtml(item.completedOrders)}</strong>
            <small>completed orders</small>
            <div class="status ${status.className}">${status.label}</div>
          </article>
        `;
      }

      function getWindowStatus(windowCompleted) {
        if (windowCompleted === true) {
          return {
            className: 'complete',
            label: 'Window completed'
          };
        }

        if (windowCompleted === false) {
          return {
            className: 'active',
            label: 'Still in progress'
          };
        }

        return {
          className: 'unknown',
          label: 'Status unavailable'
        };
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    </script>
  </body>
</html>
